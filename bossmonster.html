<!DOCTYPE html>
<html lang="ko">
<script src="js/coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 보스 도감</title>
<link rel="stylesheet" href="shared.css">
<style>
.b-card{
  background:linear-gradient(135deg,rgba(255,68,68,.08),rgba(150,40,20,.08));
  border:2px solid #f88;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}
.b-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}
.b-icon{
  width:56px;height:56px;
  border-radius:12px;
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  flex-shrink:0;
}
.b-title{flex:1;min-width:0}
.b-name{font-size:15px;font-weight:700;color:#f88}
.b-map{font-size:10px;color:var(--text-faint);margin-top:2px}
.b-desc{font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.b-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.b-stat{font-size:10px;padding:6px 8px;background:rgba(0,0,0,.3);border-radius:6px;display:flex;justify-content:space-between}
.b-stat .lbl{color:var(--text-faint)}
.b-stat .val{color:#fc4;font-weight:700}
.attacks-section{margin-top:10px}
.attacks-title{font-size:11px;color:var(--s);font-weight:700;margin-bottom:6px}
.attack-chip{
  display:inline-block;
  font-size:10px;
  padding:4px 8px;
  background:rgba(255,68,68,.15);
  border:1px solid rgba(255,68,68,.3);
  border-radius:4px;
  margin:2px;
  color:#f88;
}
.phases{display:flex;gap:4px;margin-top:8px}
.phase-dot{
  flex:1;
  height:6px;
  background:rgba(0,0,0,.4);
  border-radius:3px;
}
.phase-dot.active{background:linear-gradient(90deg,#f88,#fa0)}
.b-status{
  display:inline-block;
  font-size:10px;
  padding:4px 8px;
  border-radius:6px;
  font-weight:700;
  margin-left:auto;
}
.b-status.defeated{background:rgba(74,170,136,.2);color:var(--p-2)}
.b-status.alive{background:rgba(255,68,68,.2);color:#f88}
</style>
</head>
<body>
<header class="app-header">
  <h1>💀 보스 <span class="sub">도감</span></h1>
  <a href="store.html" class="btn btn-primary btn-sm">상점</a>
</header>
<main class="container" style="padding-top:16px;padding-bottom:40px">

<div class="nav-links">
  <a class="nav-link" href="item1.html">🧪 소모품·재료</a>
  <a class="nav-link" href="item2.html">⚔️ 무기·도구</a>
  <a class="nav-link" href="item3.html">📚 환경 서적</a>
  <a class="nav-link" href="item4.html">🔮 조합·특수</a>
  <a class="nav-link" href="monster.html">👹 몬스터 도감</a>
  <a class="nav-link" href="bossmonster.html" style="color:var(--p-2);border-color:var(--border-strong)">💀 보스 도감</a>
</div>

<div id="main"></div>

</main>
<script src="core.js"></script>
<script src="mapData.js"></script>
<script>
'use strict';
Save.load();
const main=document.getElementById('main');
const defeated=new Set((Save.g('bossesDefeated')||[]).concat(
  Object.keys(Save.g('storyFlags')||{}).filter(k=>k.startsWith('bossDefeated_')).map(k=>k.replace('bossDefeated_',''))
));

const bosses=[
  {id:'sludge_titan',mapName:'Ch.1 — 폐허 분지'},
  {id:'smog_colossus',mapName:'Ch.2 — 미세먼지 협곡'},
  {id:'plastic_leviathan',mapName:'Ch.3 — 플라스틱 해안'},
  {id:'pollution_king',mapName:'Ch.4 — 오염의 심장'},
];

function getAttackName(id){
  const attacks={
    sludge_pool:'독성 웅덩이',toxic_spit:'독액 발사',pollution_wave:'오염 파동',
    smog_cloud:'독성 안개',acid_rain:'산성비',cyclone:'회오리',
    wave_crash:'파도 충돌',debris_storm:'잔해 폭풍',plastic_tentacle:'촉수 공격',microplastic_cloud:'미세플라스틱 구름',
    corruption_beam:'오염 광선',trash_rain:'쓰레기 폭풍',toxic_nova:'독성 노바',summon_minions:'하수인 소환',final_wrath:'최후의 분노',
  };
  return attacks[id]||id;
}

bosses.forEach(b=>{
  const md=MonsterDB[b.id]||ExtMonsters?.[b.id];
  if(!md)return;
  const isDefeated=defeated.has(b.id);
  const phases=md.phases||1;
  const card=document.createElement('div');
  card.className='b-card';
  card.innerHTML=`
    <div class="b-header">
      <div class="b-icon">${md.icon}</div>
      <div class="b-title">
        <div class="b-name">${md.name}</div>
        <div class="b-map">${b.mapName}</div>
      </div>
      <div class="b-status ${isDefeated?'defeated':'alive'}">${isDefeated?'✓ 격파':'● 대기'}</div>
    </div>
    <div class="b-desc">${md.desc}</div>
    <div class="b-stats">
      <div class="b-stat"><span class="lbl">HP</span><span class="val">${md.hp}</span></div>
      <div class="b-stat"><span class="lbl">DMG</span><span class="val">${md.dmg}</span></div>
      <div class="b-stat"><span class="lbl">속도</span><span class="val">${md.speed.toFixed(2)}</span></div>
      <div class="b-stat"><span class="lbl">크기</span><span class="val">${md.size}</span></div>
      <div class="b-stat"><span class="lbl">XP</span><span class="val">${md.xp}</span></div>
      <div class="b-stat"><span class="lbl">페이즈</span><span class="val">${phases}</span></div>
    </div>
    <div class="phases">${Array(phases).fill(0).map((_,i)=>`<div class="phase-dot ${isDefeated?'active':''}"></div>`).join('')}</div>
    <div class="attacks-section">
      <div class="attacks-title">⚔️ 특수 공격 패턴</div>
      <div>${(md.attacks||[]).map(a=>`<span class="attack-chip">${getAttackName(a)}</span>`).join('')}</div>
    </div>`;
  main.appendChild(card);
});

const summary=document.createElement('div');
summary.className='card';
summary.style.marginTop='20px';
summary.innerHTML=`
  <div class="card-title">👑 최종 보스: 오염왕</div>
  <p style="font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:6px">
    모든 맵을 정화하고 나면 최종 보스 <b style="color:#f88">오염왕</b>이 등장합니다.
    5단계 페이즈와 5가지 특수 공격 패턴을 가진 최강의 적입니다.
    충분한 장비를 준비하고, 콤보와 물약을 활용하세요!
  </p>
  <p style="font-size:10px;color:var(--text-faint);margin-top:8px">
    격파 시: <b style="color:var(--s)">"세계의 구원자"</b> 트로피 + 정화된 세계로 가는 포탈
  </p>`;
main.appendChild(summary);
</script>
</body>
</html>
