<!DOCTYPE html>
<html lang="ko">
<script src="coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 몬스터 도감</title>
<link rel="stylesheet" href="shared.css">
<style>
.m-card{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin-bottom:8px;
  display:flex;gap:12px;align-items:flex-start;
}
.m-card.boss{border:2px solid #f88;background:rgba(255,68,68,.05)}
.m-card.locked{opacity:.5}
.m-icon{
  width:48px;height:48px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  flex-shrink:0;
}
.m-info{flex:1;min-width:0}
.m-name{font-size:13px;font-weight:700;color:#f88}
.m-card:not(.boss) .m-name{color:#ca8}
.m-desc{font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:4px}
.m-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.m-stat{font-size:9px;padding:3px 7px;background:rgba(0,0,0,.3);border-radius:4px}
.m-stat.hp{color:#f88}.m-stat.dmg{color:#fc4}.m-stat.spd{color:#6af}
.m-stat.chapter{color:#ca8}.m-stat.behavior{color:#a6f}
.m-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.m-status{font-size:9px;padding:3px 7px;border-radius:4px;font-weight:700}
.m-status.have{background:rgba(74,170,136,.15);color:var(--p-2)}
.m-status.lack{background:rgba(0,0,0,.3);color:#888}
</style>
</head>
<body>
<header class="app-header">
  <h1>👹 몬스터 <span class="sub">도감</span></h1>
  <a href="store.html" class="btn btn-primary btn-sm">상점</a>
</header>
<main class="container" style="padding-top:16px;padding-bottom:40px">

<div class="nav-links">
  <a class="nav-link" href="item1.html">🧪 소모품·재료</a>
  <a class="nav-link" href="item2.html">⚔️ 무기·도구</a>
  <a class="nav-link" href="item3.html">📚 환경 서적</a>
  <a class="nav-link" href="item4.html">🔮 조합·특수</a>
  <a class="nav-link" href="monster.html" style="color:var(--p-2);border-color:var(--border-strong)">👹 몬스터 도감</a>
  <a class="nav-link" href="bossmonster.html">💀 보스 도감</a>
</div>

<div id="main"></div>

</main>
<script src="core.js"></script>
<script src="mapData.js"></script>
<script>
'use strict';
Save.load();
const main=document.getElementById('main');
const discovered=new Set(Save.g('discoveredMonsters')||[]);

function section(t,i){const h=document.createElement('div');h.className='section-title';h.innerHTML=i+' '+t;main.appendChild(h);}

function renderMons(title,icon,ids){
  section(title,icon);
  ids.forEach(id=>{
    const md=MonsterDB[id]||ExtMonsters?.[id];
    if(!md)return;
    const isBoss=md.isBoss||false;
    const has=discovered.has(id);
    const card=document.createElement('div');
    card.className='m-card'+(isBoss?' boss':'')+(has?'':' locked');
    const behaviorTxt={wander:'배회',chase:'추적',patrol:'순찰',boss:'보스 AI'}[md.behavior]||'배회';
    card.innerHTML=`
      <div class="m-icon" style="background:${md.color}22">${has?md.icon:'❓'}</div>
      <div class="m-info">
        <div class="m-name">${has?md.name:'???'}</div>
        <div class="m-desc">${has?md.desc:'아직 발견하지 못했습니다.'}</div>
        <div class="m-stats">
          ${has?`
            <span class="m-stat hp">HP ${md.hp}</span>
            <span class="m-stat dmg">DMG ${md.dmg}</span>
            <span class="m-stat spd">SPD ${md.speed.toFixed(2)}</span>
            <span class="m-stat behavior">${behaviorTxt}</span>
            <span class="m-stat chapter">Ch.${md.chapter||md.map?.replace('map','')||'?'}</span>
          `:''}
        </div>
      </div>
      <div class="m-right">
        <div class="m-status ${has?'have':'lack'}">${has?'✓ 발견':'🔒 미발견'}</div>
      </div>`;
    main.appendChild(card);
  });
}

renderMons('Ch.1 — 폐허 분지','🌑',['slime','plastic_wraith','smog_spirit','trash_golem','oil_crawler']);
renderMons('Ch.2 — 미세먼지 협곡','🌫️',['dust_phantom','ash_crawler','smog_golem','acid_wisp']);
renderMons('Ch.3 — 플라스틱 해안','🌊',['microplastic_swarm','bottle_golem','coral_ghost']);
renderMons('Ch.4 — 오염의 심장','☠️',['corruption_knight','toxic_hydra']);

// Summary
const summary=document.createElement('div');
summary.className='card';
summary.style.marginTop='20px';
summary.innerHTML=`
  <div class="card-title">📊 도감 현황</div>
  <p style="font-size:12px;color:var(--text-dim)">발견: <b style="color:var(--p-2)">${discovered.size}</b> 마리</p>
  <p style="font-size:11px;color:var(--text-faint);margin-top:6px">몬스터 50마리 처치 시 <b style="color:var(--s)">"오염 사냥꾼"</b> 트로피 획득!</p>`;
main.appendChild(summary);
</script>
</body>
</html>
