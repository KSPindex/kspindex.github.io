<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>현장 기록 보관소 — EcoRestore</title>
<link rel="stylesheet" href="shared.css">
<style>
body{background:#0d1110;color:#e7eee9;font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0}.wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:22px}.brand{font-size:22px;font-weight:900;color:#9ff0bf}.nav{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid rgba(160,255,190,.22);padding:9px 12px;border-radius:10px;color:#dfffea;text-decoration:none;background:rgba(255,255,255,.04)}.hero{border:1px solid rgba(160,255,190,.18);border-radius:18px;padding:24px;background:linear-gradient(135deg,rgba(80,120,80,.18),rgba(30,40,35,.7));margin-bottom:18px}.hero h1{margin:0 0 10px}.hero p{line-height:1.75;color:#cbd8d1}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:16px;padding:18px}.card h2{font-size:16px;margin:0 0 12px;color:#bff7cf}.log{font-size:14px;line-height:1.7;color:#d8e1dc;border-left:3px solid rgba(160,255,190,.35);padding-left:12px;margin:12px 0}.tag{display:inline-block;font-size:11px;color:#9db5aa;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px 8px;margin-bottom:10px}.note{margin-top:22px;color:#a9b8b0;font-size:13px;line-height:1.7}.danger{color:#ffb4a8}.muted{color:#9aa9a1}</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">EcoRestore / 현장 기록 보관소</div>
    <div class="nav">
      <a class="btn" href="index.html">게임으로</a>
      <a class="btn" href="incident-report.html">오염 사고 보고서</a>
      <a class="btn" href="restoration-notes.html">복구 작업 노트</a>
    </div>
  </div>
  <section class="hero">
    <h1>기록은 복구의 일부다</h1>
    <p>오염 지역에서 확인되는 문제는 갑자기 생긴 재난이 아니라, 처리 비용을 미루고 책임을 분산시키며 생긴 결과다. 이 보관소는 게임 안 조사 지점과 연결되는 현장 로그를 정리한다.</p>
  </section>
  <div class="grid" id="logGrid"></div>
  <p class="note">이 페이지의 문장은 게임 내 조사 지점, 낙하 폐기물 경고, 지역 브리핑에 사용됩니다. 과장된 영웅담보다 <span class="danger">방치의 결과</span>와 <span class="danger">복구의 느린 속도</span>를 보여주는 방향으로 작성되었습니다.</p>
</div>
<script src="core.js"></script>
<script src="mapData.js"></script>
<script src="storyData.js"></script>
<script>
const names={general:'공통 현장 메모',skyWaste:'낙하 폐기물 경고',factory:'공장/배수로',village:'주거지 피해',water:'물길/수원',air:'대기오염',ocean:'해양 플라스틱',final:'복합 오염원'};
const grid=document.getElementById('logGrid');
function card(title, logs, tag){
  const el=document.createElement('section');el.className='card';
  el.innerHTML=`<span class="tag">${tag}</span><h2>${title}</h2>`+logs.map(x=>`<div class="log">${x}</div>`).join('');
  grid.appendChild(el);
}
card(names.general, FieldLogDB.general, 'FIELD');
card(names.skyWaste, FieldLogDB.skyWaste, 'SKY WASTE');
for(const [k,v] of Object.entries(FieldLogDB.poi)) card(names[k]||k, v, 'POI');
</script>
</body>
</html>
