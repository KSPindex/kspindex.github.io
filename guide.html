<!DOCTYPE html>
<html lang="ko">
<script src="js/coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 상황별 가이드</title>
<link rel="stylesheet" href="shared.css">
<style>
.guide-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:9000;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding:10px;
  animation:guideFadeIn .3s ease-out;
}
@keyframes guideFadeIn{from{opacity:0}to{opacity:1}}
.guide-popup{
  width:100%;
  max-width:440px;
  max-height:80dvh;
  background:rgba(12,18,25,.97);
  border:1px solid var(--border-strong);
  border-radius:14px 14px 8px 8px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  animation:guideSlideUp .35s ease-out;
}
@keyframes guideSlideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.guide-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  background:rgba(0,0,0,.3);
  border-bottom:1px solid var(--border);
}
.guide-header .gh-icon{font-size:28px;flex-shrink:0}
.guide-header .gh-title{font-size:14px;font-weight:700;color:var(--p-2)}
.guide-header .gh-type{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.guide-close{
  margin-left:auto;
  width:36px;height:36px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--text-dim);
  font-size:16px;
  flex-shrink:0;
}
.guide-close:active{background:rgba(255,255,255,.15)}
.guide-body{
  padding:14px 16px;
  overflow-y:auto;
  flex:1;
}
.guide-body p{font-size:12px;color:var(--text);line-height:1.7;margin-bottom:10px}
.gb-highlight{color:var(--p-2);font-weight:700}
.gb-warn{color:var(--s);font-weight:700}
.gb-danger{color:#f88;font-weight:700}
.guide-body ul{margin-left:18px;font-size:12px;color:var(--text);line-height:1.7;margin-bottom:10px}
.guide-body li{margin-bottom:4px}
</style>
</head>
<body>
<div class="guide-backdrop">
  <div class="guide-popup">
    <div class="guide-header">
      <div class="gh-icon">📖</div>
      <div>
        <div class="gh-title">상황별 가이드</div>
        <div class="gh-type">CONTEXTUAL GUIDE</div>
      </div>
      <button class="guide-close" onclick="window.parent?.postMessage({action:'closeGuide'},'*')||history.back()">✕</button>
    </div>
    <div class="guide-body" id="guideBody">
      <p>로딩 중...</p>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script>
'use strict';
// Get guide type from URL param or use default
const params=new URLSearchParams(location.search);
const guideType=params.get('type')||'first_play';
const guideId=params.get('id')||'';

const Guides={
  first_play:{
    title:'🎮 첫 게임 환영!',
    body:`
      <p><span class="gb-highlight">에코리스토어에 오신 것을 환영합니다!</span></p>
      <p>당신의 임무는 오염된 세계를 정화하고, 오염 괴물들을 물리쳐 세계를 구원하는 것입니다.</p>
      <p><b>시작 방법:</b></p>
      <ul>
        <li>📱 <b>모바일:</b> 화면 좌측 하단의 조이스틱으로 이동, 우측 하단 버튼으로 액션</li>
        <li>💻 <b>PC:</b> WASD 이동, SPACE 정화, E 심기, F 공격</li>
      </ul>
      <p><span class="gb-highlight">첫 번째 목표:</span> 오염된 타일 10개를 정화하세요! 🎯</p>
    `
  },
  item:{
    title:'📦 아이템 획득!',
    body:`
      <p>새로운 아이템을 획득했습니다!</p>
      <p><span class="gb-highlight">${guideId?'<b>'+guideId+'</b>':''}</span></p>
      <p>인벤토리에서 아이템을 확인하고, 필요한 경우 즉시 사용할 수 있습니다.</p>
      <p>💡 <span class="gb-warn">물약</span>은 즉시 사용, <span class="gb-warn">무기/도구</span>는 장착 후 효과를 얻습니다.</p>
    `
  },
  low_health:{
    title:'⚠️ HP 부족!',
    body:`
      <p><span class="gb-danger">체력이 위험합니다!</span></p>
      <p>즉시 안전한 곳으로 이동하고, 인벤토리의 <span class="gb-warn">체력 물약</span>을 사용하세요.</p>
      <p>💡 몬스터와 보스에게 닿으면 큰 데미지를 받습니다.</p>
      <p>💡 물약은 상점에서도 구매할 수 있습니다.</p>
    `
  },
  boss_appear:{
    title:'💀 보스 출현!',
    body:`
      <p><span class="gb-danger">강력한 보스가 출현했습니다!</span></p>
      <p>보스는 일반 몬스터보다 훨씬 강하며, 다양한 공격 패턴을 가지고 있습니다.</p>
      <p><b>전투 팁:</b></p>
      <ul>
        <li>⚔️ 강력한 무기를 장착하세요</li>
        <li>💊 물약을 충분히 준비하세요</li>
        <li>🛡️ 보호막 구슬을 활용하세요</li>
        <li>🏃 보스의 공격 패턴을 파악하세요</li>
      </ul>
    `
  },
  first_book:{
    title:'📖 책 발견!',
    body:`
      <p><span class="gb-highlight">환경 서적을 발견했습니다!</span></p>
      <p>이 책에는 이 세계가 어떻게 파괴되었는지 기록되어 있습니다.</p>
      <p>5권을 모두 수집하면 <span class="gb-warn">"지식의 수호자"</span> 트로피를 획득합니다!</p>
      <p>💡 인벤토리에서 책을 읽어보세요.</p>
    `
  },
  purity_30:{
    title:'🌱 30% 정화 달성!',
    body:`
      <p><span class="gb-highlight">정화율 30%를 달성했습니다!</span></p>
      <p>더 강한 괴물들이 나타나기 시작할 것입니다. 장비를 강화하고 물약을 준비해 두세요.</p>
    `
  },
  purity_50:{
    title:'🌿 50% 정화 달성!',
    body:`
      <p><span class="gb-highlight">정화의 절반을 넘었습니다!</span></p>
      <p>하지만 오염왕도 당신의 존재를 느끼기 시작했을 것입니다.</p>
      <p>70%에 도달하면 보스가 출현합니다. 만전을 기하세요!</p>
    `
  },
};

const guide=Guides[guideType]||Guides.first_play;
document.getElementById('guideBody').innerHTML=guide.body;
</script>
</body>
</html>
