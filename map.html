<!DOCTYPE html>
<html lang="ko">
<script src="js/coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 맵 정보</title>
<link rel="stylesheet" href="shared.css">
<style>
.map-tabs{
  display:flex;gap:6px;overflow-x:auto;
  margin-bottom:12px;padding-bottom:4px;
  scrollbar-width:none;
}
.map-tabs::-webkit-scrollbar{display:none}
.mtab{
  padding:10px 14px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:8px;
  font-family:inherit;font-size:11px;
  color:var(--text-faint);
  cursor:pointer;
  white-space:nowrap;
  font-weight:600;
  min-height:36px;
  flex:0 0 auto;
}
.mtab.on{background:rgba(60,100,80,.6);border-color:var(--border-strong);color:var(--p-2)}
.mtab.locked{opacity:.4;cursor:not-allowed}
.map-cv-wrap{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  background:#111;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:14px;
}
.map-cv-wrap canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.map-label{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,.7);
  padding:6px 10px;border-radius:6px;
  font-size:10px;color:var(--p-2);
  font-weight:600;
}
.map-purity{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,.7);
  padding:6px 10px;border-radius:6px;
  font-size:10px;color:var(--s);font-weight:600;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}}
.info-panel{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:10px;padding:12px;
}
.info-panel h3{font-size:12px;color:var(--p-2);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:700}
.info-panel p{font-size:11px;color:var(--text-dim);line-height:1.6}
.stat-row{
  display:flex;justify-content:space-between;
  font-size:11px;padding:4px 0;
  border-bottom:1px solid var(--border);
}
.stat-row:last-child{border-bottom:none}
.stat-row .lbl{color:var(--text-dim)}
.stat-row .val{color:var(--p-2);font-weight:700}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-faint)}
.legend-item .swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.1)}
</style>
</head>
<body>
<header class="app-header">
  <h1>🗺️ 맵 정보 <span class="sub">Maps</span></h1>
  <a href="index.html" class="btn btn-primary btn-sm">← 게임</a>
</header>
<main class="container" style="padding-top:16px;padding-bottom:40px">

<div class="map-tabs" id="mapTabs"></div>

<div class="map-cv-wrap">
  <canvas id="mapCv" width="400" height="300"></canvas>
  <div class="map-label" id="mapLabel">Ch.1 — 폐허 분지</div>
  <div class="map-purity" id="mapPurity">정화율: ?%</div>
</div>

<div class="info-grid">
  <div class="info-panel">
    <h3>📖 맵 정보</h3>
    <p id="mapDesc"></p>
    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:#3a6a2a"></div>정화</div>
      <div class="legend-item"><div class="swatch" style="background:#3a3020"></div>오염</div>
      <div class="legend-item"><div class="swatch" style="background:#2a4a6a"></div>물</div>
      <div class="legend-item"><div class="swatch" style="background:#606060"></div>바위</div>
      <div class="legend-item"><div class="swatch" style="background:#5c5;border-radius:50%"></div>시작</div>
      <div class="legend-item"><div class="swatch" style="background:#8af;border-radius:50%"></div>포탈</div>
    </div>
  </div>
  <div class="info-panel">
    <h3>📊 맵 통계</h3>
    <div id="mapStats">
      <div class="stat-row"><span class="lbl">난이도</span><span class="val" id="sDiff">?</span></div>
      <div class="stat-row"><span class="lbl">크기</span><span class="val" id="sSize">?</span></div>
      <div class="stat-row"><span class="lbl">쓰레기 속도</span><span class="val" id="sTrash">?</span></div>
      <div class="stat-row"><span class="lbl">보스 출현</span><span class="val" id="sBoss">?</span></div>
      <div class="stat-row"><span class="lbl">정화율</span><span class="val" id="sPurity">?</span></div>
      <div class="stat-row"><span class="lbl">다음 맵</span><span class="val" id="sNext">?</span></div>
    </div>
  </div>
</div>

<div class="info-panel">
  <h3>👹 등장 몬스터</h3>
  <div id="monstersList" style="display:flex;flex-direction:column;gap:6px;margin-top:6px"></div>
</div>

<div class="info-panel" style="margin-top:10px">
  <h3>🏛️ 주요 지점</h3>
  <div id="ruinsList" style="display:flex;flex-direction:column;gap:6px;margin-top:6px"></div>
</div>

</main>
<script src="core.js"></script>
<script src="mapData.js"></script>
<script>
'use strict';
Save.load();
const mapIds=Object.keys(MapData);
const unlocked=Math.max(1, Number(Save.g('unlockedLevels')||1));

let curIdx=0;
const tabs=document.getElementById('mapTabs');
const cv=document.getElementById('mapCv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

mapIds.forEach((id,i)=>{
  const btn=document.createElement('button');
  btn.className='mtab';
  if(i>=unlocked)btn.classList.add('locked');
  btn.textContent=`Ch.${MapData[id].chapter} ${MapData[id].name}`;
  btn.disabled=i>=unlocked;
  btn.addEventListener('click',()=>{if(i<unlocked){curIdx=i;render();}});
  tabs.appendChild(btn);
});

function render(){
  const id=mapIds[curIdx];
  const md=MapData[id];
  document.querySelectorAll('.mtab').forEach((b,i)=>{
    b.classList.toggle('on',i===curIdx);
  });
  document.getElementById('mapLabel').textContent=`Ch.${md.chapter} — ${md.name}`;
  document.getElementById('mapPurity').textContent=`정화율: ${md.chapter<=unlocked?'진행 가능':'미해금'}`;
  document.getElementById('mapDesc').textContent=md.desc||'';
  document.getElementById('sDiff').textContent='★'.repeat(md.difficulty)+'☆'.repeat(4-md.difficulty);
  document.getElementById('sSize').textContent=`${md.cols}×${md.rows}`;
  document.getElementById('sTrash').textContent=`${md.trashRate}ms`;
  document.getElementById('sBoss').textContent=`정화 70% (${(MonsterDB[md.boss.type]||ExtMonsters[md.boss.type]).name})`;
  document.getElementById('sPurity').textContent=md.chapter<=unlocked?'진행 가능':'— 미해금 —';
  document.getElementById('sNext').textContent=md.nextMap?MapData[md.nextMap].name:'🏆 엔딩';
  const ml=document.getElementById('monstersList');
  ml.innerHTML='';
  (md.monsterWaves||[]).forEach(w=>{
    const m=MonsterDB[w.type]||ExtMonsters?.[w.type];
    if(!m)return;
    const row=document.createElement('div');
    row.className='stat-row';
    row.innerHTML=`<span class="lbl">${m.icon} ${m.name}</span><span class="val">정화 ${w.purity}%+ · HP ${m.hp}</span>`;
    ml.appendChild(row);
  });
  const rl=document.getElementById('ruinsList');
  rl.innerHTML='';
  (md.ruins||[]).forEach(r=>{
    const row=document.createElement('div');
    row.className='stat-row';
    row.innerHTML=`<span class="lbl">${r.icon} ${r.name}</span><span class="val">(${r.col+1}, ${r.row+1})</span>`;
    rl.appendChild(row);
  });
  // Draw map
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,400,300);
  const gen=generateMap(id);
  const pal=md.palette;
  for(let r=0;r<md.rows;r++)for(let c=0;c<md.cols;c++){
    const t=gen.tiles[r][c],x=c*20,y=r*20;
    switch(t){
      case T.POL:ctx.fillStyle=pal.pol;ctx.fillRect(x,y,20,20);break;
      case T.CLN:ctx.fillStyle=pal.cln;ctx.fillRect(x,y,20,20);break;
      case T.GRS:ctx.fillStyle=pal.grs;ctx.fillRect(x,y,20,20);
        ctx.fillStyle='#5ab04a';for(let i=0;i<3;i++)ctx.fillRect(x+4+i*6,y+14,1,4);break;
      case T.T1:case T.T2:case T.T3:ctx.fillStyle=pal.grs;ctx.fillRect(x,y,20,20);
        ctx.fillStyle='#6b4226';ctx.fillRect(x+9,y+8,2,10);
        ctx.fillStyle=pal['t'+(t-T.T1+1)];ctx.fillRect(x+4,y+2,12,9);break;
      case T.WAT:ctx.fillStyle='#2a4a6a';ctx.fillRect(x,y,20,20);break;
      case T.ROK:ctx.fillStyle='#555';ctx.fillRect(x,y,20,20);break;
      case T.LAV:ctx.fillStyle='#8a2a0a';ctx.fillRect(x,y,20,20);
        ctx.fillStyle='#e04010';ctx.fillRect(x+3,y+3,14,14);break;
      default:ctx.fillStyle='#222';ctx.fillRect(x,y,20,20);
    }
  }
  if(md.ruins)md.ruins.forEach(r=>{
    ctx.fillStyle='rgba(200,150,80,.18)';ctx.fillRect(r.col*20,r.row*20,r.w*20,r.h*20);
    ctx.fillStyle='rgba(200,150,80,.5)';ctx.font='8px monospace';ctx.fillText(r.icon,r.col*20+4,r.row*20+12)});
  const[sc,sr]=md.startPos;
  ctx.fillStyle='rgba(80,200,80,.4)';ctx.beginPath();ctx.arc(sc*20+10,sr*20+10,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5c5';ctx.beginPath();ctx.arc(sc*20+10,sr*20+10,4,0,Math.PI*2);ctx.fill();
  if(md.portalPos){const[pc,pr]=md.portalPos;
    ctx.fillStyle='rgba(130,170,255,.3)';ctx.beginPath();ctx.arc(pc*20+10,pr*20+10,7,0,Math.PI*2);ctx.fill();}
  if(md.palette.ambient){ctx.fillStyle=md.palette.ambient;ctx.fillRect(0,0,400,300)}
}

render();
</script>
</body>
</html>
