<!DOCTYPE html>
<html lang="ko">
<script src="coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 비주얼 노벨</title>
<link rel="stylesheet" href="shared.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  min-height:100dvh;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif;
  color:#ddd;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  user-select:none;
  -webkit-user-select:none;
}
#vn-wrap{
  width:min(100vw, 100dvh * 4 / 3);
  aspect-ratio:4/3;
  max-width:100vw;
  max-height:100dvh;
  position:relative;
  background:#000;
}
/* Background scene */
#vn-scene{position:absolute;top:0;left:0;width:100%;height:100%}
#vn-scene canvas{width:100%;height:100%;image-rendering:pixelated;display:block}
/* Characters */
#vn-chars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.vn-char{
  position:absolute;
  bottom:30%;
  transition:opacity .4s, filter .4s;
  image-rendering:pixelated;
}
.vn-char.left{left:8%}
.vn-char.center{left:50%;transform:translateX(-50%)}
.vn-char.right{right:8%}
.vn-char.dim{opacity:.4;filter:brightness(.6)}
.vn-char.active{opacity:1;filter:brightness(1)}
.vn-char canvas{width:100%;height:100%;image-rendering:pixelated}
/* Dialogue box */
#vn-dialog{
  position:absolute;
  bottom:0; left:0; right:0;
  background:rgba(8,12,18,.96);
  border-top:2px solid rgba(100,200,150,.3);
  min-height:120px;
  cursor:pointer;
  padding:0;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
#vn-namebox{
  position:absolute;
  top:-30px; left:14px;
  background:rgba(10,20,15,.97);
  border:1px solid rgba(100,200,150,.4);
  border-radius:8px 8px 0 0;
  padding:6px 18px;
  font-size:13px;
  font-weight:700;
  color:#5c5;
  min-width:90px;
  text-align:center;
  max-width:60%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
#vn-text{
  padding:16px 18px 14px;
  font-size:14px;
  line-height:1.7;
  color:#ccc;
  min-height:80px;
  white-space:pre-wrap;
  user-select:text;
  -webkit-user-select:text;
}
#vn-indicator{
  position:absolute;
  bottom:8px; right:16px;
  font-size:10px;
  color:rgba(150,200,150,.6);
  animation:vnBlink 1s infinite;
  pointer-events:none;
}
@keyframes vnBlink{0%,100%{opacity:1}50%{opacity:.3}}
/* Choice buttons */
#vn-choices{
  position:absolute;
  bottom:140px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:center;
  z-index:10;
  display:none;
  width:90%;
  max-width:400px;
}
.vn-choice{
  padding:12px 24px;
  background:rgba(15,25,20,.95);
  border:2px solid rgba(100,200,150,.3);
  border-radius:10px;
  color:#8f8;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  min-width:200px;
  text-align:center;
  width:100%;
  min-height:48px;
}
.vn-choice:hover,.vn-choice:active{border-color:#5c5;background:rgba(30,60,40,.95);transform:scale(1.02)}
/* Transition */
#vn-fade{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  pointer-events:none;
  opacity:0;
  transition:opacity .6s;
  z-index:50;
}
#vn-fade.active{opacity:1}
/* Emotion */
.vn-emotion{
  position:absolute;
  top:-32px; left:50%;
  transform:translateX(-50%);
  font-size:26px;
  animation:emotePop .5s ease-out;
  pointer-events:none;
}
@keyframes emotePop{
  0%{transform:translateX(-50%) scale(0) translateY(10px)}
  50%{transform:translateX(-50%) scale(1.3) translateY(-5px)}
  100%{transform:translateX(-50%) scale(1) translateY(0)}
}
/* Progress */
#vn-progress{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.06);z-index:5}
#vn-progress-fill{height:100%;background:linear-gradient(90deg,#4a8,#5c5);transition:width .3s;width:0}
/* Top buttons */
#vn-skip, #vn-back{
  position:absolute;
  top:max(10px, env(safe-area-inset-top));
  padding:8px 14px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.2);
  border-radius:8px;
  color:#bbb;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  z-index:10;
  min-height:36px;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
#vn-skip{right:10px}
#vn-back{left:10px;display:none}
/* Mobile-specific sizing */
@media (max-width:600px){
  .vn-char{width:80px;height:90px}
  .vn-char.left{left:5%}
  .vn-char.right{right:5%}
  #vn-dialog{min-height:140px}
  #vn-text{font-size:13px;padding:14px 16px 12px}
  #vn-namebox{font-size:12px;padding:5px 14px}
}
@media (min-width:601px){
  .vn-char{width:110px;height:130px}
  #vn-text{font-size:15px}
}
</style>
</head>
<body>
<div id="vn-wrap">
  <div id="vn-scene"><canvas id="sceneCv" width="400" height="300"></canvas></div>

  <div id="vn-progress"><div id="vn-progress-fill"></div></div>
  <button id="vn-skip">건너뛰기 ▸▸</button>
  <button id="vn-back" onclick="location.href='index.html'">← 게임으로</button>

  <div id="vn-dialog">

// ─── SCENE BACKGROUNDS ─────────────────────────────────────────────────────
function drawBG(name) {
  const c = sctx, w = 400, h = 300;
  c.clearRect(0, 0, w, h);

  switch(name) {
    case 'wasteland_dark':
      c.fillStyle = '#1a1510'; c.fillRect(0, 0, w, h);
      c.fillStyle = '#2a2015'; c.fillRect(0, h*0.7, w, h*0.3);
      for (let i = 0; i < 20; i++) {
        c.fillStyle = `rgba(${60+i*3},${40+i*2},${20},0.4)`;
        c.fillRect(i*20, h*0.7 + Math.sin(i)*5, 20, h*0.3);
      }
      break;
    case 'wasteland':
      c.fillStyle = '#2a2518'; c.fillRect(0, 0, w, h);
      for (let y = 0; y < h*0.5; y++) {
        const t = y / (h*0.5);
        c.fillStyle = `rgb(${Math.floor(30+t*20)},${Math.floor(25+t*15)},${Math.floor(15+t*10)})`;
        c.fillRect(0, y, w, 1);
      }
      c.fillStyle = '#3a3020'; c.fillRect(0, h*0.5, w, h*0.5);
      for (let i = 0; i < 15; i++) {
        c.fillStyle = ['#555','#777','#444','#666'][i%4];
        c.fillRect(i*28+5, h*0.6+Math.sin(i*2)*10, 12+i%3*4, 8+i%2*6);
      }
      for (let i = 0; i < 5; i++) {
        c.fillStyle = 'rgba(120,160,40,0.3)';
        c.fillRect(i*80+10, h*0.8+i*3, 30, 6);
      }
      break;
    case 'flashback_green':
      for (let y = 0; y < h*0.4; y++) {
        c.fillStyle = `rgb(${80+Math.floor(y*0.3)},${150+Math.floor(y*0.2)},${220-Math.floor(y*0.3)})`;
        c.fillRect(0, y, w, 1);
      }
      c.fillStyle = '#3a8a3a'; c.fillRect(0, h*0.4, w, h*0.6);
      for (let i = 0; i < 8; i++) {
        c.fillStyle = '#5a3a1a'; c.fillRect(i*55+20, h*0.3, 6, h*0.25);
        c.fillStyle = '#2a7a2a'; c.fillRect(i*55+8, h*0.2, 30, 25);
        c.fillStyle = '#3a9a3a'; c.fillRect(i*55+12, h*0.15, 22, 15);
      }
      for (let i = 0; i < 20; i++) {
        c.fillStyle = ['#f88','#ff4','#f4f','#fa8'][i%4];
        c.fillRect(i*20+3, h*0.5+Math.sin(i)*8, 4, 4);
      }
      c.fillStyle = 'rgba(80,160,255,0.5)'; c.fillRect(0, h*0.65, w, 15);
      c.fillStyle = 'rgba(120,200,255,0.3)'; c.fillRect(0, h*0.67, w, 8);
      break;
    case 'flashback_dark':
      for (let y = 0; y < h*0.5; y++) {
        c.fillStyle = `rgb(${60+Math.floor(y*0.2)},${50+Math.floor(y*0.1)},${40})`;
        c.fillRect(0, y, w, 1);
      }
      c.fillStyle = '#3a3020'; c.fillRect(0, h*0.5, w, h*0.5);
      for (let i = 0; i < 4; i++) {
        c.fillStyle = '#444'; c.fillRect(i*100+10, h*0.25, 40, h*0.3);
        c.fillStyle = '#555'; c.fillRect(i*100+18, h*0.1, 14, h*0.2);
        c.fillStyle = 'rgba(100,90,70,0.4)';
        c.fillRect(i*100+20, h*0.02+Math.sin(Date.now()*.001+i)*5, 10, 25);
      }
      break;
    case 'wasteland_partial':
    case 'wasteland_half':
      c.fillStyle = '#2a2a18'; c.fillRect(0, 0, w, h);
      c.fillStyle = '#3a3a22'; c.fillRect(0, h*0.5, w, h*0.5);
      const greenPct = name === 'wasteland_half' ? 0.5 : 0.3;
      for (let i = 0; i < Math.floor(w/20*greenPct); i++) {
        c.fillStyle = '#3a6a2a'; c.fillRect(i*20+2, h*0.5, 18, h*0.5);
        c.fillStyle = '#5ab04a'; c.fillRect(i*20+6, h*0.55, 1, 8);
        c.fillRect(i*20+12, h*0.58, 1, 6);
      }
      break;
    case 'wasteland_boss':
      c.fillStyle = '#1a0a0a'; c.fillRect(0, 0, w, h);
      c.fillStyle = '#2a1a0a'; c.fillRect(0, h*0.5, w, h*0.5);
      c.fillStyle = 'rgba(200,40,20,0.1)'; c.fillRect(0, 0, w, h*0.5);
      if (Math.random() < 0.05) {
        c.fillStyle = 'rgba(255,200,100,0.3)'; c.fillRect(Math.random()*w, 0, 2, h*0.5);
      }
      break;
    case 'restored':
      for (let y = 0; y < h*0.45; y++) {
        c.fillStyle = `rgb(${100+Math.floor(y*0.4)},${180+Math.floor(y*0.3)},${230-Math.floor(y*0.2)})`;
        c.fillRect(0, y, w, 1);
      }
      c.fillStyle = '#3a8a3a'; c.fillRect(0, h*0.45, w, h*0.55);
      for (let i = 0; i < 10; i++) {
        c.fillStyle = '#5a3a1a'; c.fillRect(i*42+8, h*0.3, 5, h*0.2);
        c.fillStyle = '#2a7a2a'; c.fillRect(i*42, h*0.2, 22, 20);
      }
      for (let i = 0; i < 25; i++) {
        c.fillStyle = ['#f88','#ff4','#f4f','#4af','#8f8'][i%5];
        c.fillRect(i*16+2, h*0.55+Math.sin(i*1.5)*6, 3, 3);
      }
      c.fillStyle = 'rgba(130,180,255,0.15)';
      c.beginPath(); c.arc(w/2, h*0.6, 30, 0, Math.PI*2); c.fill();
      break;
    default:
      c.fillStyle = '#1a1a1a'; c.fillRect(0, 0, w, h);
  }
}

function drawPortrait(canvas, type) {
  const c = canvas.getContext('2d'); c.imageSmoothingEnabled = false;
  const w = canvas.width, h = canvas.height;
  c.clearRect(0, 0, w, h);

  if (type === 'elder') {
    c.fillStyle = '#3a5a4a'; c.fillRect(20, 50, 40, 40);
    c.fillStyle = '#2a4a3a'; c.fillRect(24, 52, 32, 35);
    c.fillStyle = '#c8a878'; c.fillRect(28, 20, 24, 26);
    c.fillStyle = '#ccc'; c.fillRect(30, 40, 20, 14); c.fillRect(32, 44, 16, 12);
    c.fillStyle = '#aaa'; c.fillRect(26, 16, 28, 8); c.fillRect(24, 18, 4, 12); c.fillRect(52, 18, 4, 12);
    c.fillStyle = '#333'; c.fillRect(32, 28, 4, 3); c.fillRect(44, 28, 4, 3);
    c.fillStyle = '#999'; c.fillRect(31, 26, 6, 1); c.fillRect(43, 26, 6, 1);
    c.fillStyle = '#6a4a2a'; c.fillRect(12, 25, 4, 65);
    c.fillStyle = '#8f8'; c.fillRect(10, 20, 8, 7);
  } else if (type === 'boss') {
    c.fillStyle = '#420'; c.fillRect(15, 15, 50, 55);
    c.fillStyle = '#310'; c.fillRect(20, 20, 40, 45);
    c.fillStyle = '#f44'; c.fillRect(26, 30, 6, 6); c.fillRect(46, 30, 6, 6);
    c.fillStyle = '#a00'; c.fillRect(30, 45, 20, 6);
    c.fillStyle = '#640'; c.fillRect(10, 10, 12, 20); c.fillRect(58, 10, 12, 20);
    c.fillStyle = 'rgba(150,80,0,0.4)';
    c.fillRect(5, 60, 70, 20);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  VN ENGINE
// ═══════════════════════════════════════════════════════════════════════════
const VN = {
  script: null,
  idx: 0,
  typing: false,
  typedText: '',
  typeIdx: 0,
  typeTimer: null,
  activeChars: {},
  calledFrom: null,

  init() {
    Save.load();
    const params = new URLSearchParams(location.search);
    const scriptId = params.get('script') || 'intro';
    this.calledFrom = params.get('from') || 'index.html';

    if (!Scripts[scriptId]) { location.href = this.calledFrom; return; }

    this.script = Scripts[scriptId];
    this.idx = 0;

    document.getElementById('vn-dialog').addEventListener('click', () => this.advance());
    document.getElementById('vn-skip').addEventListener('click', e => { e.stopPropagation(); this.skipToEnd(); });
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); this.advance(); }
      if (e.code === 'Escape') this.skipToEnd();
    });

    this.execute();
  },

  execute() {
    if (!this.script || this.idx >= this.script.length) { this.finish(); return; }

    const cmd = this.script[this.idx];
    const progPct = (this.idx / this.script.length * 100);
    document.getElementById('vn-progress-fill').style.width = progPct + '%';

    switch(cmd.type) {
      case 'line':
        document.getElementById('vn-namebox').textContent = cmd.speaker || '';
        document.getElementById('vn-namebox').style.display = cmd.speaker ? 'block' : 'none';
        this.typeText(cmd.text);
        if (cmd.portrait) {
          const charDiv = this.getOrCreateChar(cmd.portrait, cmd.position || 'center');
          const cv = charDiv.querySelector('canvas');
          drawPortrait(cv, cmd.portrait);
          document.querySelectorAll('.vn-char').forEach(el => el.classList.add('dim'));
          charDiv.classList.remove('dim'); charDiv.classList.add('active');
        }
        if (cmd.emotion) {
          const charDiv = document.querySelector('.vn-char.active');
          if (charDiv) {
            let em = charDiv.querySelector('.vn-emotion');
            if (em) em.remove();
            em = document.createElement('div'); em.className = 'vn-emotion';
            em.textContent = cmd.emotion; charDiv.appendChild(em);
            setTimeout(() => em.remove(), 2000);
          }
        }
        break;

      case 'scene':
        drawBG(cmd.bg);
        this.idx++; this.execute();
        break;

      case 'fade':
        const fadeEl = document.getElementById('vn-fade');
        if (cmd.dir === 'out') { fadeEl.classList.add('active'); }
        else { fadeEl.classList.remove('active'); }
        this.idx++; setTimeout(() => this.execute(), 600);
        break;

      case 'wait':
        this.idx++; setTimeout(() => this.execute(), cmd.ms || 500);
        break;

      case 'choice':
        this.showChoices(cmd.options);
        break;

      case 'flag':
        Save.setFlag(cmd.key, cmd.value);
        this.idx++; this.execute();
        break;

      case 'item':
        Inventory.add(cmd.id, cmd.qty || 1);
        this.idx++; this.execute();
        break;

      case 'quest':
        Quests.startQuest(cmd.id);
        this.idx++; this.execute();
        break;

      case 'end':
        this.finish();
        break;

      default:
        this.idx++; this.execute();
    }
  },

  typeText(text) {
    this.typing = true; this.typedText = ''; this.typeIdx = 0;
    const el = document.getElementById('vn-text');
    document.getElementById('vn-indicator').style.display = 'none';

    clearInterval(this.typeTimer);
    this.typeTimer = setInterval(() => {
      if (this.typeIdx < text.length) {
        this.typedText += text[this.typeIdx];
        el.textContent = this.typedText;
        this.typeIdx++;
        if (this.typeIdx % 3 === 0 && typeof playBeep === 'function') playBeep(300 + Math.random()*200, 0.03, 'sine', 0.02);
      } else {
        clearInterval(this.typeTimer);
        this.typing = false;
        document.getElementById('vn-indicator').style.display = 'block';
      }
    }, 30);
  },

  advance() {
    if (this.typing) {
      clearInterval(this.typeTimer);
      const cmd = this.script[this.idx];
      if (cmd && cmd.type === 'line') {
        document.getElementById('vn-text').textContent = cmd.text;
      }
      this.typing = false;
      document.getElementById('vn-indicator').style.display = 'block';
      return;
    }
    this.idx++;
    this.execute();
  },

  showChoices(options) {
    const el = document.getElementById('vn-choices');
    el.style.display = 'flex'; el.innerHTML = '';
    document.getElementById('vn-indicator').style.display = 'none';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'vn-choice';
      btn.textContent = opt.text;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        el.style.display = 'none';
        if (Scripts[opt.goto]) {
          this.script = Scripts[opt.goto];
          this.idx = 0;
          this.execute();
        } else {
          this.idx++;
          this.execute();
        }
      });
      el.appendChild(btn);
    });
  },

  getOrCreateChar(id, position) {
    let existing = document.querySelector(`.vn-char[data-id="${id}"]`);
    if (!existing) {
      existing = document.createElement('div');
      existing.className = `vn-char ${position}`;
      existing.dataset.id = id;
      existing.innerHTML = `<canvas width="80" height="90"></canvas>`;
      document.getElementById('vn-chars').appendChild(existing);
    }
    existing.className = `vn-char ${position} active`;
    return existing;
  },

  skipToEnd() {
    clearInterval(this.typeTimer);
    while (this.idx < this.script.length) {
      const cmd = this.script[this.idx];
      if (cmd.type === 'flag') Save.setFlag(cmd.key, cmd.value);
      if (cmd.type === 'item') Inventory.add(cmd.id, cmd.qty || 1);
      if (cmd.type === 'quest') Quests.startQuest(cmd.id);
      if (cmd.type === 'end') break;
      this.idx++;
    }
    this.finish();
  },

  finish() {
    clearInterval(this.typeTimer);
    if (Save.g('chapter') === 0) Save.s('chapter', 1);
    Save.save();

    document.getElementById('vn-back').style.display = 'block';
    document.getElementById('vn-text').textContent = '[ 대화가 끝났습니다. 게임으로 돌아갑니다... ]';
    document.getElementById('vn-namebox').style.display = 'none';
    document.getElementById('vn-indicator').style.display = 'none';

    setTimeout(() => { location.href = this.calledFrom || 'index.html'; }, 2000);
  },
};

let bgName = 'wasteland_dark';
function bgLoop() { drawBG(bgName); requestAnimationFrame(bgLoop); }

document.addEventListener('DOMContentLoaded', () => {
  bgLoop();
  VN.init();
});
