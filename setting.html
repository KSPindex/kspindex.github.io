<!DOCTYPE html>
<html lang="ko">
<script src="coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 설정</title>
<link rel="stylesheet" href="shared.css">
<style>
.setting-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1;min-width:0}
.setting-label{font-size:13px;color:var(--text);font-weight:600}
.setting-desc{font-size:11px;color:var(--text-faint);margin-top:2px;line-height:1.5}
.toggle{
  width:48px;height:26px;
  border-radius:13px;
  background:#333;
  position:relative;
  cursor:pointer;
  transition:background .2s;
  flex-shrink:0;
}
.toggle.on{background:var(--p)}
.toggle::after{
  content:'';
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;
  border-radius:50%;
  background:#fff;
  transition:left .2s;
}
.toggle.on::after{left:25px}
.theme-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:8px;
}
.theme-opt{
  padding:12px;
  background:rgba(0,0,0,.3);
  border:2px solid transparent;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
  font-size:12px;
  font-weight:600;
  transition:all .15s;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.theme-opt.on{border-color:var(--p);background:rgba(74,170,136,.15)}
.theme-opt:active{transform:scale(.96)}
</style>
</head>
<body>
<header class="app-header">
  <h1>⚙️ 설정 <span class="sub">Settings</span></h1>
  <a href="index.html" class="btn btn-primary btn-sm">← 게임</a>
</header>
<main class="container" style="padding-top:16px;padding-bottom:40px">

<div class="card">
  <div class="card-title">🔊 오디오</div>
  <div class="setting-row">
    <div class="setting-info">
      <div class="setting-label">효과음</div>
      <div class="setting-desc">게임 내 효과음 재생 여부</div>
    </div>
    <div class="toggle" id="tSnd"></div>
  </div>
  <div class="setting-row">
    <div class="setting-info">
      <div class="setting-label">배경음악</div>
      <div class="setting-desc">배경 음악 재생 여부</div>
    </div>
    <div class="toggle" id="tMus"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">📱 모바일 UI</div>
  <div class="setting-row">
    <div class="setting-info">
      <div class="setting-label">모바일 컨트롤</div>
      <div class="setting-desc">터치 조이스틱 및 액션 버튼 표시. 끄면 PC 모드.</div>
    </div>
    <div class="toggle" id="tMobUI"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">🎨 테마</div>
  <div class="theme-grid">
    <div class="theme-opt" data-t="green">🌿 자연</div>
    <div class="theme-opt" data-t="dark">🌑 다크</div>
    <div class="theme-opt" data-t="ocean">🌊 오션</div>
    <div class="theme-opt" data-t="sunset">🌅 석양</div>
  </div>
</div>

<div class="card">
  <div class="card-title">⚠️ 데이터 관리</div>
  <div class="setting-row">
    <div class="setting-info">
      <div class="setting-label">세이브 데이터 초기화</div>
      <div class="setting-desc">모든 진행 상황이 삭제됩니다 (되돌릴 수 없음)</div>
    </div>
    <button class="btn btn-danger btn-sm" id="bReset">🗑 초기화</button>
  </div>
</div>

<div class="card" style="text-align:center;color:var(--text-faint);font-size:11px">
  에코리스토어 v2.0 Mobile<br>
  환경 보호 게임 — Made with 💚
</div>

</main>
<script src="core.js"></script>
<script>
'use strict';
Save.load();

function bindToggle(id,key,onChange){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('on',Save.g(key)!==false);
  el.addEventListener('click',()=>{
    el.classList.toggle('on');
    const v=el.classList.contains('on');
    Save.s(key,v);
    if(onChange)onChange(v);
  });
}

bindToggle('tSnd','soundEnabled');
bindToggle('tMus','musicEnabled');
bindToggle('tMobUI','mobileUI',v=>{
  if(typeof Mobile!=='undefined')Mobile.toggle(v);
});

const themes=document.querySelectorAll('.theme-opt');
themes.forEach(t=>{
  if(Save.g('theme')===t.dataset.t||(!Save.g('theme')&&t.dataset.t==='green')){
    t.classList.add('on');
  }
  t.addEventListener('click',()=>{
    themes.forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    Save.s('theme',t.dataset.t);
    applyTheme(t.dataset.t);
  });
});

function applyTheme(t){
  const themes={
    green:{p:'#4a8',bg:'#080a08'},
    dark:{p:'#888',bg:'#0a0a0a'},
    ocean:{p:'#48a',bg:'#060a10'},
    sunset:{p:'#a64',bg:'#100808'},
  };
  const th=themes[t]||themes.green;
  document.documentElement.style.setProperty('--p',th.p);
  document.body.style.background=th.bg;
}

document.getElementById('bReset')?.addEventListener('click',()=>{
  if(confirm('정말 모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')){
    Save.resetAll();
    alert('데이터가 초기화되었습니다.');
    location.href='index.html';
  }
});
</script>
</body>
</html>
