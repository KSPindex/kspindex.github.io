<!DOCTYPE html>
<html lang="ko">
<script src="coin-persistence.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080a08">
<title>에코리스토어 — 맵 1: 폐허 분지</title>
<link rel="stylesheet" href="shared.css">
<style>
.map-canvas-wrap{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  background:#111;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:14px;
}
.map-canvas-wrap canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.map-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:480px){.map-info{grid-template-columns:1fr}}
.info-panel{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:10px;padding:14px;
}
.info-panel h3{font-size:12px;color:var(--p-2);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:6px}
.info-panel p{font-size:11px;color:var(--text-dim);line-height:1.6}
.stat-row{
  display:flex;justify-content:space-between;
  font-size:11px;padding:4px 0;
  border-bottom:1px solid var(--border);
}
.stat-row:last-child{border-bottom:none}
.stat-row .lbl{color:var(--text-dim)}
.stat-row .val{color:var(--p-2);font-weight:700}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-faint)}
.legend-item .swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.1)}
.zone-marker{
  position:absolute;
  background:rgba(0,0,0,.7);
  border:1px solid var(--border-strong);
  border-radius:6px;
  padding:4px 8px;
  font-size:9px;
  color:var(--p-2);
  font-weight:600;
}
.zone-marker.start{top:48%;left:48%}
.zone-marker.portal{top:6%;right:6%}
</style>
</head>
<body>
<header class="app-header">
  <h1>🗺️ Ch.1 폐허 분지 <span class="sub">Map 1</span></h1>
  <a href="map.html" class="btn btn-primary btn-sm">전체 맵</a>
</header>
<main class="container" style="padding-top:16px;padding-bottom:40px">

<div class="map-canvas-wrap">
  <canvas id="mapCv" width="400" height="300"></canvas>
  <div class="zone-marker start">🟢 시작</div>
  <div class="zone-marker portal">🌀 포탈</div>
</div>

<div class="map-info">
  <div class="info-panel">
    <h3>📖 폐허 분지</h3>
    <p>한때 비옥한 농경지였으나 인근 공장의 폐수 방류와 불법 투기로 완전히 오염되었습니다.</p>
    <p>오염된 토양에서 태어난 <b style="color:#f88">독성 슬라임</b>, 버려진 쓰레기가 뭉친 <b style="color:#f88">쓰레기 골렘</b> 등 다양한 몬스터가 출현합니다.</p>
    <p>70% 정화 후 <b style="color:#fa0">슬러지 타이탄</b> 보스가 출현합니다.</p>
  </div>
  <div class="info-panel">
    <h3>📊 맵 데이터</h3>
    <div class="stat-row"><span class="lbl">챕터</span><span class="val">Ch.1</span></div>
    <div class="stat-row"><span class="lbl">난이도</span><span class="val">★☆☆☆</span></div>
    <div class="stat-row"><span class="lbl">크기</span><span class="val">20×15</span></div>
    <div class="stat-row"><span class="lbl">환경</span><span class="val">산업 폐기물</span></div>
    <div class="stat-row"><span class="lbl">물 타일</span><span class="val">3개</span></div>
    <div class="stat-row"><span class="lbl">보스</span><span class="val">슬러지 타이탄</span></div>
    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:#3a6a2a"></div>정화</div>
      <div class="legend-item"><div class="swatch" style="background:#3a3020"></div>오염</div>
      <div class="legend-item"><div class="swatch" style="background:#2a4a6a"></div>물</div>
      <div class="legend-item"><div class="swatch" style="background:#606060"></div>바위</div>
    </div>
  </div>
</div>

<div class="info-panel">
  <h3>👹 등장 몬스터</h3>
  <div id="monsterList" style="margin-top:6px"></div>
</div>

<div class="info-panel" style="margin-top:10px">
  <h3>🏛️ 주요 지점</h3>
  <div id="ruinsList" style="margin-top:6px"></div>
</div>

</main>
<script src="core.js"></script>
<script src="mapData.js"></script>
<script>
'use strict';
const md=MapData.map1;
const cv=document.getElementById('mapCv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

const gen=generateMap('map1');
const pal=md.palette;
ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,400,300);
for(let r=0;r<md.rows;r++)for(let c=0;c<md.cols;c++){
  const t=gen.tiles[r][c],x=c*20,y=r*20;
  switch(t){
    case T.POL:ctx.fillStyle=pal.pol;ctx.fillRect(x,y,20,20);break;
    case T.CLN:ctx.fillStyle=pal.cln;ctx.fillRect(x,y,20,20);break;
    case T.GRS:ctx.fillStyle=pal.grs;ctx.fillRect(x,y,20,20);
      ctx.fillStyle='#5ab04a';for(let i=0;i<3;i++)ctx.fillRect(x+4+i*6,y+14,1,4);break;
    case T.T1:case T.T2:case T.T3:ctx.fillStyle=pal.grs;ctx.fillRect(x,y,20,20);
      ctx.fillStyle='#6b4226';ctx.fillRect(x+9,y+8,2,10);
      ctx.fillStyle=pal['t'+(t-T.T1+1)];ctx.fillRect(x+4,y+2,12,9);break;
    case T.WAT:ctx.fillStyle='#2a4a6a';ctx.fillRect(x,y,20,20);
      ctx.fillStyle='rgba(100,180,255,.2)';ctx.fillRect(x+2,y+2,16,16);break;
    case T.ROK:ctx.fillStyle='#555';ctx.fillRect(x,y,20,20);break;
    case T.TRS:ctx.fillStyle=pal.pol;ctx.fillRect(x,y,20,20);
      ctx.fillStyle='#666';ctx.fillRect(x+4,y+10,5,6);break;
    default:ctx.fillStyle='#222';ctx.fillRect(x,y,20,20);
  }
}
(md.ruins||[]).forEach(r=>{
  ctx.fillStyle='rgba(200,150,80,.18)';ctx.fillRect(r.col*20,r.row*20,r.w*20,r.h*20);
  ctx.fillStyle='rgba(200,150,80,.6)';ctx.font='7px monospace';
  ctx.fillText(r.icon,r.col*20+4,r.row*20+12)});
const[sc,sr]=md.startPos;
ctx.fillStyle='rgba(80,200,80,.4)';ctx.beginPath();ctx.arc(sc*20+10,sr*20+10,8,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#5c5';ctx.beginPath();ctx.arc(sc*20+10,sr*20+10,4,0,Math.PI*2);ctx.fill();
if(md.portalPos){const[pc,pr]=md.portalPos;
  ctx.fillStyle='rgba(130,170,255,.3)';ctx.beginPath();ctx.arc(pc*20+10,pr*20+10,7,0,Math.PI*2);ctx.fill();}

// Monsters
const ml=document.getElementById('monsterList');
(md.monsterWaves||[]).forEach(w=>{
  const m=MonsterDB[w.type]||ExtMonsters?.[w.type];
  if(!m)return;
  const row=document.createElement('div');
  row.className='stat-row';
  row.innerHTML=`<span class="lbl">${m.icon} ${m.name}</span><span class="val">정화 ${w.purity}%+ · HP ${m.hp}</span>`;
  ml.appendChild(row);
});

// Ruins
const rl=document.getElementById('ruinsList');
(md.ruins||[]).forEach(r=>{
  const row=document.createElement('div');
  row.className='stat-row';
  row.innerHTML=`<span class="lbl">${r.icon} ${r.name}</span><span class="val">(${r.col+1}, ${r.row+1}) ${r.w}×${r.h}</span>`;
  rl.appendChild(row);
});
</script>
</body>
</html>
